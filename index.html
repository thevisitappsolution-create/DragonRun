<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f1420">
<meta name="description" content="À Vue — écris ce que tu vois, chaque bon mot efface l'objet. Puzzle d'observation chronométré.">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" href="icon-180.png">
<title>À Vue</title>
<style>
:root{
  --bg:#0f1420; --card:#1a2333; --card2:#222e44; --line:#2e3c58;
  --txt:#eef2f8; --dim:#8fa0bd; --gold:#f6b73c; --gold2:#ffd670;
  --teal:#35d0ba; --red:#f2545b; --radius:16px;
  --vh:100dvh;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--txt);
  font-family:'Avenir Next','Avenir','Segoe UI',system-ui,sans-serif;overflow:hidden}
#app{height:var(--vh);max-width:600px;margin:0 auto;position:relative;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}
button{font:inherit;color:inherit;cursor:pointer;border:none;background:none}

/* ---------- vues ---------- */
.view{position:absolute;inset:0;display:none;flex-direction:column;
  padding:calc(14px + env(safe-area-inset-top)) 16px calc(14px + env(safe-area-inset-bottom))}
.view.show{display:flex}
.center{align-items:center;justify-content:center;text-align:center;gap:18px}

/* ---------- menu ---------- */
.logo{font-size:64px;font-weight:900;letter-spacing:2px;line-height:1;
  background:linear-gradient(180deg,var(--gold2),var(--gold) 55%,#e08f1f);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  filter:drop-shadow(0 4px 18px rgba(246,183,60,.35))}
.logo .eye{-webkit-text-fill-color:initial;color:initial;font-size:.85em}
.tagline{font-size:13px;letter-spacing:4px;color:var(--dim);text-transform:uppercase}
.menubtns{display:flex;flex-direction:column;gap:12px;width:min(330px,86vw)}
.mbtn{display:flex;align-items:center;gap:14px;padding:15px 18px;border-radius:var(--radius);
  background:var(--card);border:1px solid var(--line);text-align:left;
  transition:transform .1s,border-color .15s,background .15s}
.mbtn:active{transform:scale(.97)}
.mbtn .ico{font-size:26px;width:34px;text-align:center}
.mbtn .lbl{font-weight:700;font-size:16px}
.mbtn .det{font-size:12px;color:var(--dim);margin-top:2px}
.mbtn.gold{background:linear-gradient(160deg,#4a3712,#2c2410);border-color:#6b5424}
.mbtn.gold .lbl{color:var(--gold2)}
.foot{font-size:11px;color:#5a6a8a;margin-top:6px}

#topBtns{position:absolute;top:calc(10px + env(safe-area-inset-top));right:12px;display:flex;gap:8px;z-index:40}
.tbtn{width:42px;height:42px;border-radius:13px;background:rgba(26,35,51,.9);
  border:1px solid var(--line);font-size:18px;transition:opacity .15s}
.tbtn.off{opacity:.35}

/* ---------- titres / retours ---------- */
.vhead{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.back{width:42px;height:42px;border-radius:13px;background:var(--card);border:1px solid var(--line);font-size:18px;flex:none}
.vtitle{font-size:20px;font-weight:800}
.vsub{font-size:12px;color:var(--dim)}

/* ---------- sélection de niveaux ---------- */
#lvlGrid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;overflow-y:auto;padding:4px 2px 20px}
.lvl{aspect-ratio:1;border-radius:14px;background:var(--card);border:1px solid var(--line);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  font-weight:800;font-size:17px;transition:transform .1s}
.lvl:active{transform:scale(.94)}
.lvl .st{font-size:9px;letter-spacing:1px;color:var(--gold)}
.lvl.done{border-color:#5a4a1e;background:linear-gradient(160deg,#33290f,#241f10)}
.lvl.lock{opacity:.32;pointer-events:none}
.lvl.lock::after{content:"🔒";font-size:12px}

/* ---------- setup (durées) ---------- */
.durbtns{display:flex;gap:12px}
.dbtn{width:88px;padding:18px 0;border-radius:var(--radius);background:var(--card);
  border:1px solid var(--line);font-size:22px;font-weight:800;transition:transform .1s}
.dbtn:active{transform:scale(.94)}
.dbtn small{display:block;font-size:11px;color:var(--dim);font-weight:400;margin-top:3px}

/* ---------- jeu ---------- */
#v-game{padding:calc(8px + env(safe-area-inset-top)) 10px calc(8px + env(safe-area-inset-bottom))}
.ghead{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.ghead .back{width:38px;height:38px}
#gTitle{font-size:14px;font-weight:800;flex:1}
#gTitle small{display:block;font-weight:400;font-size:11px;color:var(--dim)}
#clock{font-size:26px;font-weight:900;font-variant-numeric:tabular-nums;
  padding:4px 12px;border-radius:12px;background:var(--card);border:1px solid var(--line)}
#clock.alert{color:var(--red);border-color:var(--red);animation:pulse .5s infinite}
@keyframes pulse{50%{transform:scale(1.07)}}

#viewport{flex:1;position:relative;overflow:hidden;border-radius:var(--radius);
  border:1px solid var(--line);touch-action:none;background:#000}
#board{position:absolute;left:0;top:0;width:1000px;height:660px;transform-origin:0 0}
.deco{position:absolute;font-size:150px;opacity:.10;pointer-events:none;user-select:none}
.obj{position:absolute;transform:translate(-50%,-50%) scale(.2);opacity:0;
  pointer-events:none;user-select:none;line-height:1;
  transition:transform .35s cubic-bezier(.2,1.6,.4,1),opacity .3s;
  filter:drop-shadow(0 6px 10px rgba(0,0,0,.45))}
.obj.in{transform:translate(-50%,-50%) scale(1);opacity:1}
.obj.out{transform:translate(-50%,-50%) scale(0) rotate(20deg)!important;opacity:0!important;transition:transform .28s ease-in,opacity .28s}
.obj.hintring::after{content:"";position:absolute;inset:-16px;border:4px dashed var(--gold);
  border-radius:50%;animation:spin 3s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.fly{position:absolute;transform:translate(-50%,-50%);font-weight:800;font-size:30px;color:var(--teal);
  text-shadow:0 2px 10px rgba(0,0,0,.6);pointer-events:none;animation:flyup .8s ease-out forwards}
@keyframes flyup{to{transform:translate(-50%,-160%);opacity:0}}
.pt{position:absolute;width:10px;height:10px;border-radius:50%;pointer-events:none;
  animation:burst .55s ease-out forwards}
@keyframes burst{to{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0}}

.gstatus{display:flex;align-items:center;gap:8px;margin:8px 0;font-size:14px}
.chip{padding:7px 12px;border-radius:12px;background:var(--card);border:1px solid var(--line);
  font-weight:700;font-variant-numeric:tabular-nums}
.chip.grow{flex:1;text-align:center;color:var(--dim);font-weight:400;font-size:12px;
  overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.chip.btn:active{transform:scale(.94)}
#hintChip{color:var(--gold2)}

#wordForm{display:flex;gap:8px}
#word{flex:1;font-size:17px;padding:14px 16px;border-radius:14px;border:2px solid var(--line);
  background:var(--card);color:var(--txt);outline:none;min-width:0}
#word::placeholder{color:#5a6a8a}
#word.good{border-color:var(--teal);box-shadow:0 0 0 3px rgba(53,208,186,.25)}
#word.bad{border-color:var(--red);animation:shake .3s}
@keyframes shake{25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
#goBtn{width:56px;border-radius:14px;font-size:22px;font-weight:900;color:#241a05;
  background:linear-gradient(180deg,var(--gold2),var(--gold));flex:none}
#goBtn:active{transform:scale(.94)}

/* ---------- résultat / handoff / onboarding ---------- */
.panel{width:min(360px,88vw);background:var(--card);border:1px solid var(--line);
  border-radius:22px;padding:26px 22px;display:flex;flex-direction:column;align-items:center;gap:14px}
#rTitle{font-size:28px;font-weight:900}
#rTitle.win{color:var(--gold2)} #rTitle.lose{color:var(--dim)}
#rStars{font-size:46px;letter-spacing:8px;min-height:52px;display:flex;gap:8px}
#rStars span{opacity:0;transform:scale(2.4);display:inline-block}
#rStars span.pop{animation:starpop .45s cubic-bezier(.2,1.6,.4,1) forwards}
#rStars span.on{color:var(--gold)} #rStars span.dark{color:#3a4763}
@keyframes starpop{to{opacity:1;transform:scale(1)}}
#rLines{font-size:14px;color:var(--dim);text-align:center;line-height:1.8}
#rLines b{color:var(--txt)}
.pbtn{width:100%;padding:14px;border-radius:14px;font-weight:800;font-size:16px;
  background:linear-gradient(180deg,var(--gold2),var(--gold));color:#241a05;transition:transform .1s}
.pbtn:active{transform:scale(.96)}
.pbtn.ghost{background:var(--card2);color:var(--txt);border:1px solid var(--line)}
.bigico{font-size:74px;line-height:1;animation:bob 2.2s ease-in-out infinite}
@keyframes bob{50%{transform:translateY(-10px)}}
.obtitle{font-size:26px;font-weight:900;color:var(--gold2)}
.obtxt{font-size:15px;color:#c6d1e8;line-height:1.6;max-width:320px;min-height:74px}
.dots{display:flex;gap:8px}
.dots i{width:9px;height:9px;border-radius:50%;background:#3a4763;transition:all .2s}
.dots i.on{background:var(--gold);transform:scale(1.3)}
.row{display:flex;gap:10px;width:100%}
.row .pbtn{flex:1}
@media (prefers-reduced-motion:reduce){
  *{animation-duration:.01s!important;transition-duration:.01s!important}
}
</style>
</head>
<body>
<div id="app">

  <!-- MENU -->
  <section id="v-menu" class="view center show">
    <div>
      <div class="logo"><span class="eye">👁️</span> À VUE</div>
      <div class="tagline" style="margin-top:8px">Écris ce que tu vois</div>
    </div>
    <div class="menubtns">
      <button class="mbtn gold" data-go="campaign">
        <span class="ico">🗺️</span>
        <span><span class="lbl">Campagne</span><span class="det" id="campProg">50 niveaux · 12 mondes</span></span>
      </button>
      <button class="mbtn" data-go="ta">
        <span class="ico">⏱️</span>
        <span><span class="lbl">Contre-la-montre</span><span class="det" id="taBest">Un max d'objets en temps limité</span></span>
      </button>
      <button class="mbtn" data-go="duel">
        <span class="ico">⚔️</span>
        <span><span class="lbl">Duel — Rapidité</span><span class="det">2 joueurs · même scène · 3 manches</span></span>
      </button>
      <button class="mbtn" data-go="bac">
        <span class="ico">🏆</span>
        <span><span class="lbl">Baccalauréat</span><span class="det">2 joueurs · un max de points au temps</span></span>
      </button>
      <button class="mbtn" data-go="how">
        <span class="ico">❓</span>
        <span><span class="lbl">Comment jouer ?</span></span>
      </button>
    </div>
    <div class="foot">v1.2 · PWA — ajoute-moi à ton écran d'accueil 📲</div>
  </section>

  <!-- CAMPAGNE : niveaux -->
  <section id="v-levels" class="view">
    <div class="vhead">
      <button class="back" data-go="menu">←</button>
      <div><div class="vtitle">Campagne</div><div class="vsub" id="starTotal"></div></div>
    </div>
    <div id="lvlGrid"></div>
  </section>

  <!-- SETUP durée -->
  <section id="v-setup" class="view center">
    <div class="bigico" id="suIco">⏱️</div>
    <div class="obtitle" id="suTitle">Contre-la-montre</div>
    <div class="obtxt" id="suTxt" style="min-height:auto"></div>
    <div class="durbtns">
      <button class="dbtn" data-dur="30">30<small>secondes</small></button>
      <button class="dbtn" data-dur="60">60<small>secondes</small></button>
      <button class="dbtn" data-dur="90">90<small>secondes</small></button>
    </div>
    <button class="pbtn ghost" style="width:200px" data-go="menu">← Retour</button>
  </section>

  <!-- JEU -->
  <section id="v-game" class="view">
    <div class="ghead">
      <button class="back" id="gQuit">✕</button>
      <div id="gTitle">Niveau 1<small>Le salon</small></div>
      <div id="clock">60.0</div>
    </div>
    <div id="viewport"><div id="board"></div></div>
    <div class="gstatus">
      <span class="chip" id="leftChip">🧩 0</span>
      <span class="chip" id="scoreChip" style="display:none">⭐ 0</span>
      <span class="chip grow" id="msgChip">Écris ce que tu vois !</span>
      <button class="chip btn" id="hintChip">💡 +3s</button>
      <button class="chip btn" id="zoomChip">1:1</button>
    </div>
    <form id="wordForm" autocomplete="off">
      <input id="word" type="text" placeholder="Écris ce que tu vois…"
        autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" enterkeyhint="send">
      <button id="goBtn" type="submit">➜</button>
    </form>
  </section>

  <!-- RÉSULTAT -->
  <section id="v-result" class="view center">
    <div class="panel">
      <div id="rTitle">Bravo !</div>
      <div id="rStars"></div>
      <div id="rLines"></div>
      <div id="rBtns" style="display:flex;flex-direction:column;gap:10px;width:100%"></div>
    </div>
  </section>

  <!-- HANDOFF 2 joueurs -->
  <section id="v-handoff" class="view center">
    <div class="panel">
      <div class="bigico" id="hIco">📱</div>
      <div class="obtitle" id="hTitle">Au tour de Joueur 2</div>
      <div class="obtxt" id="hTxt" style="min-height:auto"></div>
      <button class="pbtn" id="hGo">Prêt !</button>
    </div>
  </section>

  <!-- ONBOARDING -->
  <section id="v-onboard" class="view center">
    <div class="bigico" id="obIco">👀</div>
    <div class="obtitle" id="obTitle"></div>
    <div class="obtxt" id="obTxt"></div>
    <div class="dots" id="obDots"></div>
    <div class="row" style="max-width:330px">
      <button class="pbtn ghost" id="obSkip">Passer</button>
      <button class="pbtn" id="obNext">Suivant →</button>
    </div>
  </section>

</div>

<div id="topBtns">
  <button class="tbtn" id="musicBtn" title="Musique">🎵</button>
  <button class="tbtn" id="sfxBtn" title="Effets sonores">🔊</button>
</div>

<script>
"use strict";
/* ============================================================
   À VUE — puzzle d'observation (PRD_A_Vue.md, v1.2 campagne)
   100 % client, aucun asset externe. PWA installable.
   ============================================================ */
const $=id=>document.getElementById(id);
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const RM=matchMedia("(prefers-reduced-motion: reduce)").matches;

/* ---------- utilitaires texte ---------- */
const norm=s=>s.toLowerCase().normalize("NFD")
  .replace(/œ/g,"oe").replace(/[^a-z0-9]/g,"");
function lev(a,b,max){
  if(Math.abs(a.length-b.length)>max) return max+1;
  let prev=[],cur=[];
  for(let j=0;j<=b.length;j++) prev[j]=j;
  for(let i=1;i<=a.length;i++){
    cur[0]=i; let best=i;
    for(let j=1;j<=b.length;j++){
      cur[j]=Math.min(prev[j]+1,cur[j-1]+1,prev[j-1]+(a[i-1]===b[j-1]?0:1));
      if(cur[j]<best)best=cur[j];
    }
    if(best>max)return max+1;
    const t=prev;prev=cur;cur=t;
  }
  return prev[b.length];
}
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);
  t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296};}

/* ---------- données : 12 thèmes (emoji + mots normalisés) ---------- */
function T(n,bg,deco,items){return{n,bg,deco,it:items.map(a=>({e:a[0],n:a[1],w:a.slice(2)}))};}
const THEMES=[
T("Le salon","linear-gradient(180deg,#2e2438,#1f1a28)",["🪟","🚪"],[
 ["🛋️","Canapé","canape","sofa","divan"],["🪑","Chaise","chaise","siege"],
 ["🕰️","Horloge","horloge","pendule"],["🖼️","Tableau","tableau","cadre","peinture"],
 ["📺","Télévision","television","tele","ecran"],["🪴","Plante","plante","pot"],
 ["📚","Livres","livre","livres","bibliotheque"],["☎️","Téléphone","telephone"],
 ["🧸","Nounours","nounours","ours","peluche"],["💡","Ampoule","ampoule","lampe"],
 ["🧹","Balai","balai"],["🪞","Miroir","miroir","glace"],["🛏️","Lit","lit"],
 ["🔑","Clé","cle","clef","cles"],["🕯️","Bougie","bougie"]]),
T("La plage","linear-gradient(180deg,#14496e,#0c2e4a)",["🌊","☁️"],[
 ["⛵","Voilier","voilier","bateau","navire"],["🦀","Crabe","crabe"],
 ["🐚","Coquillage","coquillage"],["🐟","Poisson","poisson"],["🐬","Dauphin","dauphin"],
 ["🐙","Poulpe","poulpe","pieuvre"],["🦈","Requin","requin"],["⚓","Ancre","ancre"],
 ["🏄","Surfeur","surfeur","surf"],["🕶️","Lunettes","lunettes","lunette"],
 ["🩴","Tong","tong","sandale"],["🌞","Soleil","soleil"],["🏖️","Parasol","parasol","plage"],
 ["🧴","Crème","creme"],["🪸","Corail","corail"]]),
T("Le goûter","linear-gradient(180deg,#40272b,#2a1a1e)",["🫖","🧺"],[
 ["🍎","Pomme","pomme"],["🍌","Banane","banane"],["🍰","Gâteau","gateau"],
 ["🍪","Biscuit","biscuit","cookie"],["🥐","Croissant","croissant"],["🧀","Fromage","fromage"],
 ["🍕","Pizza","pizza"],["🍓","Fraise","fraise"],["🍇","Raisin","raisin"],
 ["🥕","Carotte","carotte"],["🍞","Pain","pain"],["🍫","Chocolat","chocolat"],
 ["🍦","Glace","glace"],["🍋","Citron","citron"],["🍒","Cerise","cerise","cerises"],
 ["🥚","Œuf","oeuf","uf"]]),
T("Les animaux","linear-gradient(180deg,#23402a,#152a1b)",["🌾","🏡"],[
 ["🐮","Vache","vache"],["🐷","Cochon","cochon","porc"],["🐔","Poule","poule","coq"],
 ["🐑","Mouton","mouton","brebis"],["🐴","Cheval","cheval"],["🐰","Lapin","lapin"],
 ["🦊","Renard","renard"],["🦉","Hibou","hibou","chouette"],["🐿️","Écureuil","ecureuil"],
 ["🦔","Hérisson","herisson"],["🐺","Loup","loup"],["🐻","Ours","ours"],
 ["🦌","Cerf","cerf","biche"],["🐸","Grenouille","grenouille"]]),
T("Le jardin","linear-gradient(180deg,#1e3d2f,#12261e)",["🌿","☀️"],[
 ["🌹","Rose","rose","fleur"],["🌻","Tournesol","tournesol"],["🌳","Arbre","arbre"],
 ["🍄","Champignon","champignon"],["🐝","Abeille","abeille"],["🦋","Papillon","papillon"],

T("La ville","linear-gradient(180deg,#26303f,#171e29)",["🏙️","☁️"],[
 ["🚗","Voiture","voiture","auto"],["🚌","Bus","bus","autobus","car"],
 ["🚲","Vélo","velo","bicyclette"],["🚦","Feu","feu","feux"],["✈️","Avion","avion"],

T("L'espace","linear-gradient(180deg,#131a3a,#0a0f24)",["🌌","🌠"],[
 ["🚀","Fusée","fusee"],["🪐","Planète","planete","saturne"],["⭐","Étoile","etoile"],
 ["🌙","Lune","lune"],["☄️","Comète","comete","meteore"],
 ["👽","Alien","alien","extraterrestre","martien"],["🛸","Ovni","ovni","soucoupe"],
 ["🌍","Terre","terre"],["☀️","Soleil","soleil"],["🔭","Télescope","telescope"],
 ["👨‍🚀","Astronaute","astronaute","cosmonaute"],["🛰️","Satellite","satellite"],
 ["🤖","Robot","robot"]]),
T("Le sport","linear-gradient(180deg,#203a44,#132630)",["🏟️"],[
 ["⚽","Football","football","foot","ballon"],["🏀","Basket","basket","basketball"],
 ["🎾","Tennis","tennis","balle"],["🏓","Raquette","raquette","pingpong"],
 ["🥊","Boxe","boxe","gant"],["🏆","Trophée","trophee","coupe"],

   AUDIO — SFX + musique légère (WebAudio, zéro fichier)
   ============================================================ */
let AC=null,musGain=null,noiseBuf=null;
function audio(){
  if(!AC){AC=new (window.AudioContext||window.webkitAudioContext)();}
  if(AC.state==="suspended")AC.resume();
  if(!musGain){
    musGain=AC.createGain();musGain.gain.value=0.4;musGain.connect(AC.destination);
    const len=AC.sampleRate*0.1;noiseBuf=AC.createBuffer(1,len,AC.sampleRate);
    const d=noiseBuf.getChannelData(0);for(let i=0;i<len;i++)d[i]=Math.random()*2-1;
  }
  music.ensure();
  return AC;
}
function tone(f0,f1,dur,type,vol,when){
  if(!SAVE.sfx)return;const ac=audio(),t=when||ac.currentTime;
  const o=ac.createOscillator(),g=ac.createGain();
  o.type=type||"sine";o.frequency.setValueAtTime(f0,t);
  if(f1&&f1!==f0)o.frequency.exponentialRampToValueAtTime(Math.max(30,f1),t+dur);
  g.gain.setValueAtTime(vol||0.15,t);
  g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o.connect(g).connect(ac.destination);o.start(t);o.stop(t+dur+0.05);
}
const sfx={
  pop(){tone(520,1040,0.12,"triangle",0.22);tone(1560,1560,0.06,"sine",0.08);},
  clear(){[523,659,784,1047].forEach((f,i)=>tone(f,f,0.22,"triangle",0.18,audio().currentTime+i*0.09));},
  star(){tone(1318,1318,0.3,"triangle",0.2);},
  bad(){tone(170,110,0.18,"square",0.12);},
  hint(){tone(660,880,0.15,"sine",0.15);},
  tick(){tone(1050,1050,0.04,"sine",0.13);},
  lose(){[392,330,262].forEach((f,i)=>tone(f,f*0.92,0.28,"sine",0.16,audio().currentTime+i*0.15));},
  turn(){tone(440,660,0.2,"triangle",0.16);},
};
/* musique : boucle pentatonique douce, percussions en jeu */
function mPluck(f,t,vol,type,dec){
  const o=AC.createOscillator(),g=AC.createGain();
  o.type=type||"sine";o.frequency.value=f;
  g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.001,t+dec);
  o.connect(g).connect(musGain);o.start(t);o.stop(t+dec+0.05);
}
function mShaker(t){
  const s=AC.createBufferSource();s.buffer=noiseBuf;
  const f=AC.createBiquadFilter();f.type="highpass";f.frequency.value=7000;
  const g=AC.createGain();g.gain.setValueAtTime(0.035,t);
  g.gain.exponentialRampToValueAtTime(0.001,t+0.05);
  s.connect(f);f.connect(g);g.connect(musGain);s.start(t);s.stop(t+0.06);
}
const PENT=[262,294,330,392,440,523,587,659];
const MEL={0:4,3:5,6:4,8:3,12:2,16:3,19:4,22:3,24:2,28:1,
           32:4,35:5,38:6,40:5,44:4,48:2,51:3,54:2,56:1,60:0};
const MBASS=[131,196,220,175];
const music={
  step:0,nextT:0,timer:null,
  ensure(){
    if(this.timer||!SAVE.music||!AC)return;
    this.step=0;this.nextT=AC.currentTime+0.1;
    this.timer=setInterval(()=>this.tick(),90);
  },
  stop(){if(this.timer){clearInterval(this.timer);this.timer=null;}},
  tick(){
    while(this.nextT<AC.currentTime+0.4){
      this.play(this.step,this.nextT);
      this.step=(this.step+1)&63;this.nextT+=0.16;
    }
  },
  play(s,t){
    const bar=(s>>4)&3,st=s&15,m=MEL[s];
    if(m!==undefined){mPluck(PENT[m],t,0.10,"triangle",0.35);mPluck(PENT[m]*2,t,0.02,"sine",0.18);}
    if(st===0)mPluck(MBASS[bar],t,0.10,"sine",0.6);
    if(curView==="v-game"&&st%4===2)mShaker(t);
  }
};

/* ============================================================
   GÉNÉRATION DE SCÈNES (déterministe)
   ============================================================ */
function genScene(seed,count,themeIdx){
  const rnd=mulberry32(seed);
  const theme=THEMES[themeIdx!==undefined?themeIdx:Math.floor(rnd()*THEMES.length)];
  const pool=[...theme.it];
  for(let i=pool.length-1;i>0;i--){const j=Math.floor(rnd()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
  const chosen=[],used=new Set();
  for(const it of pool){
    if(chosen.length>=count)break;
    if(it.w.some(w=>used.has(w)))continue;
    it.w.forEach(w=>used.add(w));chosen.push(it);
  }
  // placement sans chevauchement (essais aléatoires)
  const objs=[],baseSize=Math.max(58,96-(count-4)*5);
  for(const it of chosen){
    const s=baseSize*(0.85+rnd()*0.4);
    let x=500,y=330;
    for(let t=0;t<80;t++){
      const tx=70+rnd()*860,ty=90+rnd()*500;
      if(objs.every(o=>Math.hypot(o.x-tx,o.y-ty)>(o.s+s)*0.62)){x=tx;y=ty;break;}
      if(t===79){x=tx;y=ty;}
    }
    objs.push({e:it.e,n:it.n,w:it.w,x,y,s});
  }
  return{theme,objs};
}

/* ============================================================
   PLATEAU : rendu, zoom & pan
   ============================================================ */
const board=$("board"),vp=$("viewport");
let alive=[],fit=1,zoom=1,tx=0,ty=0;
function renderScene(scene){
  board.innerHTML="";
  board.style.background=scene.theme.bg;
  const rnd=mulberry32(1);
  scene.theme.deco.forEach((d,i)=>{
    const el=document.createElement("div");el.className="deco";el.textContent=d;
    el.style.left=(80+i*420+rnd()*140)+"px";el.style.top=(40+rnd()*380)+"px";
    board.appendChild(el);
  });
  alive=[];
  scene.objs.forEach((o,i)=>{
    const el=document.createElement("span");
    el.className="obj";el.textContent=o.e;
    el.style.left=o.x+"px";el.style.top=o.y+"px";el.style.fontSize=o.s+"px";
    el.style.transitionDelay=(i*0.07)+"s";
    board.appendChild(el);
    o.el=el;alive.push(o);
  });
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    alive.forEach(o=>{o.el.classList.add("in");
      o.el.addEventListener("transitionend",()=>{o.el.style.transitionDelay="0s";},{once:true});});
  }));
  zoom=1;layout();
}
function layout(){
  const r=vp.getBoundingClientRect();
  fit=Math.min(r.width/1000,r.height/660);
  applyZ(true);
}
function applyZ(center){
  const r=vp.getBoundingClientRect(),S=fit*zoom,bw=1000*S,bh=660*S;
  if(center){tx=(r.width-bw)/2;ty=(r.height-bh)/2;}
  tx=bw<=r.width?(r.width-bw)/2:clamp(tx,r.width-bw,0);
  ty=bh<=r.height?(r.height-bh)/2:clamp(ty,r.height-bh,0);
  board.style.transform=`translate(${tx}px,${ty}px) scale(${S})`;
}
function zoomAt(px,py,nz){
  const S1=fit*zoom;nz=clamp(nz,1,4);const S2=fit*nz;
  tx=px-(px-tx)*(S2/S1);ty=py-(py-ty)*(S2/S1);
  zoom=nz;applyZ(false);
}
/* pointeurs : pan, pinch, double-tap */
const ptrs=new Map();let lastTap=0,pinchD=0,pinchZ=1;
vp.addEventListener("pointerdown",e=>{
  vp.setPointerCapture(e.pointerId);
  ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(ptrs.size===1){
    const now=Date.now();
    if(now-lastTap<300){
      const r=vp.getBoundingClientRect();
      zoomAt(e.clientX-r.left,e.clientY-r.top,zoom>1.3?1:2.2);
      lastTap=0;
    }else lastTap=now;
  }else if(ptrs.size===2){
    const[a,b]=[...ptrs.values()];pinchD=Math.hypot(a.x-b.x,a.y-b.y);pinchZ=zoom;
  }
});
vp.addEventListener("pointermove",e=>{
  const p=ptrs.get(e.pointerId);if(!p)return;
  if(ptrs.size===1){
    tx+=e.clientX-p.x;ty+=e.clientY-p.y;applyZ(false);
  }else if(ptrs.size===2){
    p.x=e.clientX;p.y=e.clientY;
    const[a,b]=[...ptrs.values()];
    const d=Math.hypot(a.x-b.x,a.y-b.y);
    const r=vp.getBoundingClientRect();
    zoomAt((a.x+b.x)/2-r.left,(a.y+b.y)/2-r.top,pinchZ*d/pinchD);
    return;
  }
  p.x=e.clientX;p.y=e.clientY;
});
const endPtr=e=>{ptrs.delete(e.pointerId);};
vp.addEventListener("pointerup",endPtr);vp.addEventListener("pointercancel",endPtr);
vp.addEventListener("wheel",e=>{e.preventDefault();
  const r=vp.getBoundingClientRect();
  zoomAt(e.clientX-r.left,e.clientY-r.top,zoom*Math.pow(1.0015,-e.deltaY));
},{passive:false});
$("zoomChip").addEventListener("click",()=>{zoom=1;applyZ(true);});
addEventListener("resize",()=>{if(curView==="v-game")layout();});

/* ============================================================
   CHRONO
   ============================================================ */
const TMR={raf:null,t0:0,off:0,dir:"down",limit:60,running:false,lastSec:-1,onEnd:null};
function tStart(dir,limit,keep){
  if(keep&&TMR.running)return;
  TMR.dir=dir;TMR.limit=limit;TMR.t0=performance.now();TMR.off=0;
  TMR.running=true;TMR.lastSec=-1;
  if(!TMR.raf)TMR.raf=requestAnimationFrame(tFrame);
}
function tElapsed(){return TMR.running?(performance.now()-TMR.t0)/1000+TMR.off:TMR.off;}
function tRemain(){return Math.max(0,TMR.limit-tElapsed());}
function tPenalty(s){TMR.off+=s;}
function tStop(){
  if(TMR.running){TMR.off=(performance.now()-TMR.t0)/1000+TMR.off;TMR.running=false;}
  if(TMR.raf){cancelAnimationFrame(TMR.raf);TMR.raf=null;}
}
function tFrame(){
  TMR.raf=null;
  if(!TMR.running)return;
  const el=$("clock");
  if(TMR.dir==="down"){
    const r=tRemain();
    el.textContent=r.toFixed(1);
    el.classList.toggle("alert",r<=5.05&&r>0);
    const s=Math.ceil(r);
    if(r<=5.05&&s!==TMR.lastSec&&r>0){TMR.lastSec=s;sfx.tick();}
    if(r<=0){tStop();el.textContent="0.0";M.onTimeUp&&M.onTimeUp();return;}
  }else{
    const e=tElapsed();
    el.textContent=e.toFixed(1);
    el.classList.remove("alert");
    if(e>=TMR.limit){tStop();M.onTimeUp&&M.onTimeUp();return;}
  }
  TMR.raf=requestAnimationFrame(tFrame);
}

/* ---------- saisie & correspondance ---------- */
function findMatch(input){
  const q=norm(input);if(q.length<2)return null;
  for(const o of alive)if(o.w.includes(q))return o;
  if(q.length<3)return null;
  let best=null,bestD=99;
  for(const o of alive)for(const w of o.w){
    if(w.length<3)continue;
    const maxD=w.length<=6?1:2;
    const d=lev(q,w,maxD);
    if(d<=maxD&&d<bestD){best=o;bestD=d;}
  }
  return best;
}
$("wordForm").addEventListener("submit",e=>{
  e.preventDefault();
  const inp=$("word"),v=inp.value.trim();
  if(!v||!M.mode)return;
  const o=findMatch(v);
  if(o){
    inp.value="";inp.classList.remove("bad");inp.classList.add("good");
    setTimeout(()=>inp.classList.remove("good"),350);
    clearObject(o);
  }else{
    inp.classList.remove("good");inp.classList.add("bad");
    setTimeout(()=>inp.classList.remove("bad"),350);
    msg("« "+v+" » ? Rien de tel ici…");
    inp.select();
    sfx.bad();
  }
  inp.focus();
});

    const el=document.createElement("button");
    el.className="lvl"+(SAVE.stars[i]>0?" done":"")+(unlocked?"":" lock");
    el.innerHTML=unlocked?(i+1)+'<span class="st">'+"★".repeat(SAVE.stars[i])+"</span>":"";
    if(unlocked)el.addEventListener("click",()=>{audio();startCampaign(i);});
    g.appendChild(el);
  }
}
function startCampaign(l){
  M.mode="camp";M.level=l;M.score=0;
  M.onSceneClear=()=>{
    const limit=timeFor(l),rem=tRemain(),frac=rem/limit;
    const stars=frac>=0.5?3:frac>=0.2?2:1;
    if(stars>SAVE.stars[l]){SAVE.stars[l]=stars;save();}
    sfx.clear();
    const btns=[];
    if(l<49)btns.push({lbl:"Niveau suivant →",fn:()=>startCampaign(l+1)});
    btns.push({lbl:"Rejouer",fn:()=>startCampaign(l),ghost:true});
    btns.push({lbl:"Carte des niveaux",fn:()=>{buildLevels();show("v-levels");},ghost:true});
    showResult({title:"Scène vidée !",cls:"win",stars,
      lines:`Niveau <b>${l+1}</b> — ${THEMES[l%12].n}<br>Temps restant : <b>${rem.toFixed(1)} s</b> / ${limit} s`,
      buttons:btns});
  };
  M.onTimeUp=()=>{
    sfx.lose();
    showResult({title:"Temps écoulé !",cls:"lose",stars:-1,
      lines:`Il restait <b>${alive.length}</b> objet(s)…<br>💡 L'indice révèle l'initiale d'un objet.`,
      buttons:[{lbl:"Réessayer",fn:()=>startCampaign(l)},
               {lbl:"Carte des niveaux",fn:()=>{buildLevels();show("v-levels");},ghost:true}]});
  };
  beginScene({seed:9000+l*7919,count:countFor(l),theme:l%12,
    title:"Niveau "+(l+1)+" / 50",timer:{dir:"down",limit:timeFor(l)}});
}

/* ============================================================
   SETUP DURÉE (contre-la-montre & baccalauréat)
   ============================================================ */
let pendingMode=null;
function setupMode(m){
  pendingMode=m;
  $("suIco").textContent=m==="ta"?"⏱️":"🏆";
  $("suTitle").textContent=m==="ta"?"Contre-la-montre":"Baccalauréat";
  $("suTxt").textContent=m==="ta"
    ?"Efface un max d'objets avant la fin du temps. Scène vidée = +3 points bonus !"
    :"Chacun son tour, mêmes scènes, même durée : qui marquera le plus de points ?";
  show("v-setup");
}
document.querySelectorAll(".dbtn").forEach(b=>b.addEventListener("click",()=>{
  audio();
  const d=+b.dataset.dur;
  if(pendingMode==="ta")startTA(d);else startBac(d);
}));

/* ============================================================
   MODE CONTRE-LA-MONTRE
   ============================================================ */
function startTA(dur){
  M.mode="ta";M.dur=dur;M.score=0;M.chain=0;
  M.seedBase=Math.floor(Math.random()*1e9);
  M.onSceneClear=()=>{M.score+=3;M.chain++;sfx.clear();nextTAScene(true);};
  M.onTimeUp=()=>{
    sfx.lose();
    const best=SAVE.bestTA[dur]||0,rec=M.score>best;
    if(rec){SAVE.bestTA[dur]=M.score;save();}
    showResult({title:rec?"Nouveau record !":"Terminé !",cls:"win",stars:-1,
      lines:`Score : <b>${M.score}</b> pt(s) en ${dur} s${rec?"":" · record : <b>"+best+"</b>"}`,
      buttons:[{lbl:"Rejouer",fn:()=>startTA(dur)},
               {lbl:"Menu",fn:()=>{refreshMenu();show("v-menu");},ghost:true}]});
  };
  nextTAScene(false);
}
function nextTAScene(keep){
  const c=5+Math.floor(Math.random()*3);
  beginScene({seed:M.seedBase+M.chain*613,count:c,
    title:"Contre-la-montre",sub:M.dur+" s — scène vidée = +3",
    timer:{dir:"down",limit:M.dur,keep},showScore:true});
}

/* ============================================================
   MODE DUEL — RAPIDITÉ (2 joueurs, 3 manches)
   ============================================================ */
const DUEL_CAP=90;
function startDuel(){
  M.mode="duel";M.round=0;M.times=[[],[]];
  M.seeds=[0,1,2].map(()=>Math.floor(Math.random()*1e9));
  duelTurn(0,0);
}
function duelTurn(round,player){
  M.round=round;M.player=player;
  const go=()=>{
    M.onSceneClear=()=>{duelDone(tElapsed());};
    M.onTimeUp=()=>{duelDone(DUEL_CAP);};
    beginScene({seed:M.seeds[round],count:7,
      title:"Manche "+(round+1)+" / 3 — "+(player?"🔵 Joueur 2":"🟡 Joueur 1"),
      sub:"Vide la scène le plus vite possible !",
      timer:{dir:"up",limit:DUEL_CAP}});
  };
  handoff(player?"🔵":"🟡",
    "Au tour de "+(player?"Joueur 2":"Joueur 1"),
    "Manche <b>"+(round+1)+" / 3</b> — même scène pour les deux joueurs.<br>Le plus rapide gagne la manche !",go);
}
function duelDone(time){
  M.times[M.player][M.round]=time;
  if(M.player===0){duelTurn(M.round,1);return;}
  // fin de manche
  const t1=M.times[0][M.round],t2=M.times[1][M.round];
  const w=t1===t2?0:(t1<t2?1:2);
  sfx.clear();
  const wins=[0,0];
  for(let r=0;r<=M.round;r++){
    const a=M.times[0][r],b=M.times[1][r];
    if(a<b)wins[0]++;else if(b<a)wins[1]++;
  }
  const lines=`🟡 Joueur 1 : <b>${t1>=DUEL_CAP?"—":t1.toFixed(1)+" s"}</b><br>`+
              `🔵 Joueur 2 : <b>${t2>=DUEL_CAP?"—":t2.toFixed(1)+" s"}</b><br>`+
              `Manches : 🟡 ${wins[0]} — ${wins[1]} 🔵`;
  if(M.round<2){
    showResult({title:w?("Manche "+(w===1?"🟡":"🔵")+" !"):"Égalité !",cls:"win",stars:-1,lines,
      buttons:[{lbl:"Manche suivante →",fn:()=>duelTurn(M.round+1,0)},
               {lbl:"Arrêter",fn:()=>{refreshMenu();show("v-menu");},ghost:true}]});
  }else{
    const champ=wins[0]===wins[1]?"Égalité parfaite !":(wins[0]>wins[1]?"🟡 Joueur 1 gagne !":"🔵 Joueur 2 gagne !");
    showResult({title:champ,cls:"win",stars:-1,lines,
      buttons:[{lbl:"Revanche !",fn:startDuel},
               {lbl:"Menu",fn:()=>{refreshMenu();show("v-menu");},ghost:true}]});
  }
}

/* ============================================================
   MODE BACCALAURÉAT (2 joueurs, au temps)
   ============================================================ */
function startBac(dur){
  M.mode="bac";M.dur=dur;M.scores=[0,0];
  M.seedBase=Math.floor(Math.random()*1e9);
  bacTurn(0);
}
function bacTurn(player){
  M.player=player;M.score=0;M.chain=0;
  const go=()=>{
    M.onSceneClear=()=>{M.score+=3;M.chain++;sfx.clear();bacScene(true);};
    M.onTimeUp=()=>{
      M.scores[player]=M.score;
      if(player===0){bacTurn(1);return;}
      const[s1,s2]=M.scores;
      const champ=s1===s2?"Égalité !":(s1>s2?"🟡 Joueur 1 gagne !":"🔵 Joueur 2 gagne !");
      sfx.clear();
      showResult({title:champ,cls:"win",stars:-1,
        lines:`🟡 Joueur 1 : <b>${s1}</b> pt(s)<br>🔵 Joueur 2 : <b>${s2}</b> pt(s)`,
        buttons:[{lbl:"Revanche !",fn:()=>startBac(M.dur)},
                 {lbl:"Menu",fn:()=>{refreshMenu();show("v-menu");},ghost:true}]});
    };
    bacScene(false);
  };
  handoff(player?"🔵":"🟡",
    "Au tour de "+(player?"Joueur 2":"Joueur 1"),
    "<b>"+M.dur+" s</b> pour marquer un max de points.<br>Mêmes scènes pour les deux joueurs — bonne chance !",go);
}
function bacScene(keep){
  const rnd=mulberry32(M.seedBase+M.chain*77);
  const c=5+Math.floor(rnd()*3);
  beginScene({seed:M.seedBase+M.chain*613,count:c,
    title:"Baccalauréat — "+(M.player?"🔵 J2":"🟡 J1"),
    sub:M.dur+" s — scène vidée = +3",
    timer:{dir:"down",limit:M.dur,keep},showScore:true});
}

/* ============================================================
   ONBOARDING
   ============================================================ */
const OB=[
  {i:"👀",t:"Observe la scène",x:"Des objets apparaissent en cascade. Tout ce que tu vois peut être nommé."},
  {i:"⌨️",t:"Écris ce que tu vois",x:"Chaque bon mot efface l'objet dans un éclat de particules. Accents, majuscules et petites fautes sont pardonnés !"},
  {i:"🤏",t:"Zoome si besoin",x:"Pince pour zoomer, glisse pour te déplacer, double-tape pour agrandir. Le bouton 1:1 réinitialise la vue."},
  {i:"⏱️",t:"Bats le chrono",x:"Vide la scène avant la fin du temps pour gagner jusqu'à ★★★. Bloqué ? 💡 révèle une initiale (+3 s)."},
];
let obIdx=0,obFromMenu=false;
function startOnboard(fromMenu){obIdx=0;obFromMenu=fromMenu;renderOb();show("v-onboard");}
function renderOb(){
  const s=OB[obIdx];
  $("obIco").textContent=s.i;$("obTitle").textContent=s.t;$("obTxt").textContent=s.x;
  $("obDots").innerHTML=OB.map((_,i)=>`<i class="${i===obIdx?'on':''}"></i>`).join("");
  $("obNext").textContent=obIdx<OB.length-1?"Suivant →":"C'est parti !";
}
function endOb(){
  SAVE.seenOb=true;save();
  refreshMenu();show("v-menu");
}
$("obNext").addEventListener("click",()=>{audio();obIdx<OB.length-1?(obIdx++,renderOb()):endOb();});
$("obSkip").addEventListener("click",()=>{audio();endOb();});

/* ============================================================
   CLAVIER iOS / PWA / DÉMARRAGE
   ============================================================ */
if(window.visualViewport){
  const fix=()=>{document.documentElement.style.setProperty("--vh",visualViewport.height+"px");
    if(curView==="v-game")layout();};
  visualViewport.addEventListener("resize",fix);fix();
}
if("serviceWorker" in navigator&&location.protocol.startsWith("http")){
  addEventListener("load",()=>navigator.serviceWorker.register("service-worker.js").catch(()=>{}));
}
document.addEventListener("pointerdown",function boot(){audio();},{once:true});
refreshMenu();
if(!SAVE.seenOb)startOnboard(false);
</script>
